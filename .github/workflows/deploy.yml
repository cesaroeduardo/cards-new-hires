name: Deploy to Azion

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Install Azion CLI
        run: |
          curl -sSL https://get.azion.dev/cli.sh | bash

      - name: Deploy to Azion
        run: |
          azioncli edge_applications deploy --token ${{ secrets.AZION_TOKEN }} --file-path dist/
